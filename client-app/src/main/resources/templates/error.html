<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Client App - Error</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<main class="layout">
    <nav class="nav">
        <div class="brand">
            <div class="logo">APP</div>
            <div>
                <div class="brand-title">Client App</div>
                <div class="brand-subtitle">Error de autenticación</div>
            </div>
        </div>
    </nav>

    <section class="card">
        <div class="kicker">Error</div>
        <h1>No se pudo completar el flujo OAuth</h1>

        <p th:text="${error}" class="alert"></p>

        <p>
            Revise el estado OAuth, el código de autorización o el intercambio contra el IdP.
        </p>

        <div class="actions">
            <a class="button" href="/">Volver al inicio</a>
            <a class="button button-secondary" href="/login">Intentar de nuevo</a>
        </div>
    </section>
</main>
</body>
</html>
